services:
  - type: web
    name: miGaleria-api
    runtime: docker
    buildCommand: docker build -t miGaleria .
    startCommand: docker run -p $PORT:8080 miGaleria
    envVars:
      - key: PORT
        fromService:
          type: web
          name: miGaleria-api
          property: port
      - key: DATABASE_URL
        sync: false  # El usuario debe configurarlo manualmente
