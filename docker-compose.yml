version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - migaleria-network

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=migaleria
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - migaleria-network

volumes:
  postgres_data:

networks:
  migaleria-network:
    driver: bridge
