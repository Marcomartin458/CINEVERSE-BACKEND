# Configuración para desarrollo local
# COPIA este archivo como application.properties y configura tu BD local

spring.application.name=miGaleria

# Puerto del servidor
server.port=8080

# Configuración de la base de datos PostgreSQL LOCAL
# Cambia estos valores según tu instalación local
spring.datasource.url=jdbc:postgresql://localhost:5432/migaleria
spring.datasource.username=postgres
spring.datasource.password=TU_PASSWORD_AQUI
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Configuración adicional para desarrollo
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
